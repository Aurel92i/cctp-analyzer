# =============================================================================
# CCAP Analyzer - Configuration Render
# Lexigency - 2026
# =============================================================================

services:
  - type: web
    name: ccap-analyzer
    runtime: python
    region: frankfurt
    plan: starter

    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MODEL_LIGHT
        value: "openai/gpt-4o-mini"
      - key: MODEL_MEDIUM
        value: "anthropic/claude-sonnet-4-20250514"
      - key: MODEL_EXPERT
        value: "openai/gpt-4o"

    healthCheckPath: /health
